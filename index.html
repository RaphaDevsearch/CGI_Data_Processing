<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGI Playground - Data Manager</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">

    <h1>CGI Playground</h1>

    <p class="subtitle">
        Read and write data using CGI in C.
    </p>

    <form action="/cgi/view_data.cgi" method="GET">

        <div class="form-group">

            <label>View Stored Data</label>

            <p class="description">
                Display all records stored on the server.
            </p>

        </div>

        <button type="submit">
            View Data
        </button>

    </form>

    <div class="footer">

        Want to create a new record?

        <a href="/add_data.html">
            Add Data
        </a>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
